name: Build APK

on:
  # 手动触发，可选 flet 版本
  workflow_dispatch:
    inputs:
      flet_version:
        description: "Flet 版本 (如 0.23.2, 0.24.1, 0.25.2)"
        required: true
        default: "0.23.2"
        type: string

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉代码
      - uses: actions/checkout@v4

      # 2. 安装 Java (Android 构建需要)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. 安装 Flutter SDK
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      # 4. 安装 Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 5. 安装 flet CLI
      - name: Install Flet
        run: pip install flet==${{ github.event.inputs.flet_version }}

      # 6. 清理缓存，确保干净构建
      - name: Clean build cache
        run: |
          rm -rf build/
          rm -rf ~/.cookiecutters/flet-build-template
          rm -rf ~/.cookiecutters/flet-build-template.zip

      # 7. 构建 APK
      - name: Build APK
        run: flet build apk --verbose

      # 8. 上传 APK 产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: scy-apk-flet-${{ github.event.inputs.flet_version }}
          path: build/apk/app-release.apk
          retention-days: 30
