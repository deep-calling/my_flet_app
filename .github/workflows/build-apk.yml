name: Build APK

on:
  workflow_dispatch:
    inputs:
      flet_version:
        description: "Flet 版本 (如 0.25.2)"
        required: true
        default: "0.25.2"
        type: string

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.3"
          channel: stable
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Flet
        run: pip install flet==${{ github.event.inputs.flet_version }}

      - name: Clean build cache
        run: |
          rm -rf build/
          rm -rf ~/.cookiecutters/flet-build-template

      - name: Build APK
        run: flet build apk --verbose

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scy-apk-flet-${{ github.event.inputs.flet_version }}
          path: build/apk/app-release.apk
          retention-days: 30
